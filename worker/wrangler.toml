name = "trip-push-worker"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV namespace for storing push subscriptions
[[kv_namespaces]]
binding = "SUBSCRIPTIONS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Cron triggers — runs at each notification time (JST = UTC+9)
# Day 1 (3/19): 10:30, 12:30, 14:55, 15:45, 17:15 JST → 01:30, 03:30, 05:55, 06:45, 08:15 UTC
# Day 2 (3/20): 07:45, 09:45, 11:45, 13:45, 14:45, 15:50, 17:20 JST → 22:45(3/19), 00:45, 02:45, 04:45, 05:45, 06:50, 08:20 UTC
[triggers]
crons = [
  "30 1 19 3 *",
  "30 3 19 3 *",
  "55 5 19 3 *",
  "45 6 19 3 *",
  "15 8 19 3 *",
  "45 22 19 3 *",
  "45 0 20 3 *",
  "45 2 20 3 *",
  "45 4 20 3 *",
  "45 5 20 3 *",
  "50 6 20 3 *",
  "20 8 20 3 *"
]

[vars]
VAPID_SUBJECT = "mailto:your-email@example.com"
VAPID_PUBLIC_KEY = "BBgq9vZBcOV_b0P44gfsU272Y0n1I9UkL6pGXifwaCDiT-0JiDUHbxYnKCeWi3oecUipfWa4ghZKqsfPZEfw4xc"
