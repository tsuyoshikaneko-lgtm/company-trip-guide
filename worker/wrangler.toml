name = "trip-push-worker"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV namespace for storing push subscriptions
[[kv_namespaces]]
binding = "SUBSCRIPTIONS"
id = "0e29b7e7e02c43a297c3447fb7905819"

# Cron triggers — consolidated to 5 (Free plan limit)
# Some combos fire without a matching notification; Worker's SCHEDULE_MAP handles this gracefully.
# Day 1 (3/19 UTC):
#   1:30 (JST 10:30), 3:30 (JST 12:30)
#   5:55 (JST 14:55), 8:15 (JST 17:15)  — also fires 5:15, 8:55 (no-ops)
#   6:45 (JST 15:45), 22:45 (JST 翌7:45)
# Day 2 (3/20 UTC):
#   0:45 (JST 9:45), 2:45 (JST 11:45), 4:45 (JST 13:45)
#   6:50 (JST 15:50), 8:20 (JST 17:20)  — also fires 6:20, 8:50 (no-ops)
[triggers]
crons = [
  "30 1,3 19 3 *",
  "55,15 5,8 19 3 *",
  "45 6,22 19 3 *",
  "45 0,2,4 20 3 *",
  "50,20 6,8 20 3 *"
]

[vars]
VAPID_SUBJECT = "mailto:your-email@example.com"
